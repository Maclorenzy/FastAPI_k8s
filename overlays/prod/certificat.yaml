apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls-prod-cert
  namespace: fastapi-prod
spec:
  secretName: tls-prod-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - fastapi_prod.laurenthoarau.cloud-ip.cc
  duration: 4320h                  # 180 jours à partur du 02 Avril 2026
  renewBefore: 720h                # Renouveler 30 jours avant
